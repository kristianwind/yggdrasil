name: CI

# The safety gate for pull requests: build, vet and test the Go backend and
# compile the Svelte frontend. Auto-merge (auto-merge.yml) only fires when this
# succeeds, so nothing lands on main without passing here.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Match the release build (pinned for the stdlib security fixes).
          go-version: "1.26.x"

      - name: Go build / vet / test
        run: |
          go build ./...
          go vet ./...
          go test ./...

      # website/docs/ is generated from docs/*.md and committed, so the static
      # site needs no build step to deploy. That only holds if the two stay in
      # sync — regenerate and fail if the working tree moves.
      - name: Docs site is up to date with docs/
        run: |
          go run ./cmd/docs-gen
          if ! git diff --quiet -- website/docs; then
            echo "::error::website/docs/ is stale. Run 'go run ./cmd/docs-gen' and commit the result."
            git diff --stat -- website/docs
            exit 1
          fi
          echo "website/docs/ matches docs/."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend test and build (compiles the Svelte app)
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm test
            npm run build
          else
            echo "No web/package.json — skipping frontend build."
          fi
