name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (if present)
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm run build
          else
            echo "No web/package.json yet; using committed placeholder web/dist."
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to the latest 1.26 patch (>=1.26.4) so shipped binaries include
          # the crypto/x509 + net/textproto stdlib security fixes (GO-2026-5037,
          # GO-2026-5039). go.mod keeps its 1.26.3 language directive.
          go-version: "1.26.x"

      - name: Build static binaries
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          for arch in amd64 arm64; do
            echo "Building linux/$arch..."
            GOOS=linux GOARCH=$arch go build \
              -ldflags "-s -w -X main.version=$VERSION" \
              -o "dist/yggdrasil-linux-$arch" ./cmd/yggdrasil
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum yggdrasil-linux-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yggdrasil-linux-amd64
            dist/yggdrasil-linux-arm64
            dist/checksums.txt
          generate_release_notes: true

  # Announce the release in Discord. Deliberately a webhook and not a bot: nothing
  # to host, no gateway to keep alive, no token with server-wide reach — the same
  # call the panel's own status board makes.
  #
  # Skips cleanly when the secret isn't configured, so forks and a not-yet-set-up
  # repo don't get a red X on every release.
  announce:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we want the tag's annotation, not just the commit

      - name: Post the release to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${WEBHOOK:-}" ]; then
            echo "No DISCORD_RELEASE_WEBHOOK secret set — skipping the announcement."
            exit 0
          fi
          git fetch --force --tags --quiet
          # The tag annotation is a hand-written summary of what shipped, which is
          # what a reader wants — better than a generated list of merge commits.
          git tag -l --format='%(contents)' "$TAG" > /tmp/notes.txt
          python3 .github/scripts/discord_release.py < /tmp/notes.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: go vet ./...
      - run: go test ./...
