name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (if present)
        run: |
          if [ -f web/package.json ]; then
            cd web
            npm ci
            npm run build
          else
            echo "No web/package.json yet; using committed placeholder web/dist."
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build static binaries
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          for arch in amd64 arm64; do
            echo "Building linux/$arch..."
            GOOS=linux GOARCH=$arch go build \
              -ldflags "-s -w -X main.version=$VERSION" \
              -o "dist/yggdrasil-linux-$arch" ./cmd/yggdrasil
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum yggdrasil-linux-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yggdrasil-linux-amd64
            dist/yggdrasil-linux-arm64
            dist/checksums.txt
          generate_release_notes: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
