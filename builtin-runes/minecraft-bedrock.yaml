gameskill:
  id: minecraft-bedrock
  name: "Minecraft (Bedrock)"
  category: "Minecraft"
  description: "Mojang Bedrock dedicated server (no Steam, no RCON — console only)"
  author: "yggdrasil-core"
  version: 2
  icon: "minecraft"

  # CAVEAT: The Bedrock dedicated server is x86_64-only. On arm64 hosts it must
  # run under emulation (box64/qemu); native arm64 is not provided by Mojang.
  docker:
    image: "ubuntu:22.04"

  variables:
    - key: SERVER_NAME
      name: "Server name"
      type: string
      default: "Yggdrasil Bedrock"
    - key: GAMEMODE
      name: "Default gamemode"
      type: select
      options: [survival, creative, adventure]
      default: survival
    - key: DIFFICULTY
      name: "Difficulty"
      type: select
      options: [peaceful, easy, normal, hard]
      default: easy
    - key: MAX_PLAYERS
      name: "Max players"
      type: int
      default: 10
    - key: ALLOW_LIST
      name: "Enable allow-list (whitelist)"
      type: bool
      default: false
    - key: EULA
      name: "Accept the Minecraft EULA and Privacy Policy"
      type: bool
      default: false
      required: true

  install:
    image: "ubuntu:22.04"
    script: |
      set -e
      apt-get update && apt-get install -y curl unzip ca-certificates
      # Resolve the current Linux Bedrock download URL from Mojang's links API.
      URL=$(curl -fsSL -A "Mozilla/5.0 (Yggdrasil)" \
        "https://net-secondary.web.minecraft-services.net/api/v1.0/download/links" \
        | grep -o 'https[^"]*bin-linux/bedrock-server[^"]*\.zip' | head -1)
      if [ -z "$URL" ]; then echo "Could not resolve Bedrock download URL"; exit 1; fi
      echo "Downloading $URL"
      curl -fsSL -A "Mozilla/5.0 (Yggdrasil)" -o /tmp/bedrock.zip "$URL"
      # Preserve config files across updates; overwrite the binary/libs.
      unzip -o /tmp/bedrock.zip -x "server.properties" "allowlist.json" "permissions.json" -d /data
      [ -f /data/server.properties ] || unzip -o /tmp/bedrock.zip "server.properties" -d /data
      chmod +x /data/bedrock_server || true
      # bedrock_server needs system libcurl (absent from the ubuntu base). Install
      # it here (we run as root during install) and bundle the full shared-library
      # closure into .libs so the runtime works without root/apt.
      apt-get install -y libcurl4 ca-certificates >/dev/null 2>&1 || true
      mkdir -p /data/.libs /data/.certs
      # Online-mode needs HTTPS to Minecraft services. bedrock_server's libcurl reads
      # the CA bundle from its compiled-in default path ONLY (it ignores
      # SSL_CERT_FILE/CURL_CA_BUNDLE), so stage the bundle here; the panel mounts it
      # at /etc/ssl/certs/ca-certificates.crt at runtime. Without this the server
      # logs "Could not connect to Minecraft services" and stops in online mode.
      cp -L /etc/ssl/certs/ca-certificates.crt /data/.certs/ca-certificates.crt 2>/dev/null || true
      # Bundle bedrock_server's libs AND libcurl's own closure (libssl/libcrypto/…) —
      # ldd of the binary alone can miss libcurl's TLS backend, breaking HTTPS.
      LC=$(ldconfig -p 2>/dev/null | grep 'libcurl.so.4' | awk '{print $NF}' | head -1)
      for b in /data/bedrock_server "$LC"; do
        [ -n "$b" ] && [ -f "$b" ] || continue
        ldd "$b" 2>/dev/null | awk '/=> \//{print $3}' | while read -r lib; do
          [ -f "$lib" ] && cp -Ln "$lib" /data/.libs/ 2>/dev/null || true
        done
      done
      [ -n "$LC" ] && cp -Ln "$LC" /data/.libs/ 2>/dev/null || true

  startup:
    # Re-stamp server.properties from the CURRENT settings on every start (like the
    # Java rune), so changing Difficulty / Gamemode / Max players / Allow-list in
    # Settings and restarting actually takes effect. Before this the whole form was
    # cosmetic: the server always ran with the zip's default server.properties, so
    # difficulty (and the rest) had no effect no matter what you picked.
    #
    # server-name uses the panel's server name (SERVER_NAME is injected). Bedrock
    # reads stdin for console commands (no RCON); exec hands it PID 1 + stdin so the
    # "stop" command reaches it. The bundled .libs on LD_LIBRARY_PATH avoid apt.
    command: |
      setprop() { if grep -q "^$1=" server.properties 2>/dev/null; then sed -i "s#^$1=.*#$1=$2#" server.properties; else echo "$1=$2" >> server.properties; fi; }
      setprop server-name "{{SERVER_NAME}}"
      setprop gamemode {{GAMEMODE}}
      setprop difficulty {{DIFFICULTY}}
      setprop max-players {{MAX_PLAYERS}}
      setprop allow-list {{ALLOW_LIST}}
      exec env LD_LIBRARY_PATH=/data/.libs:/data ./bedrock_server
    done_regex: 'Server started'
    stop: "stop"

  query:
    type: minecraft-bedrock

  rcon:
    enabled: false   # Bedrock has no RCON; commands go to the container stdin

  config_files:
    - "server.properties"
    - "allowlist.json"
    - "permissions.json"

  ports:
    - { name: game,  default: 19132, protocol: udp }
    - { name: game6, default: 19133, protocol: udp }

  backup:
    include: ["worlds", "server.properties", "allowlist.json", "permissions.json"]
