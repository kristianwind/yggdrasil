gameskill:
  id: adguardhome
  name: "AdGuard Home"
  category: "Apps"
  description: "Network-wide ad & tracker blocker + local DNS, with a friendlier UI than Pi-hole. The admin UI runs on the panel-allocated web port; first launch shows a setup wizard. NOTE: the DNS service lands on the panel-allocated high port, not :53 — to use it as your real network DNS you need a fixed/host port mapping, which the panel's per-server port model doesn't provide."
  author: "yggdrasil-community"
  version: 1
  icon: "app"

  # AdGuard Home runs its own binary via the image entrypoint (keep it, run as root
  # so it can bind the DNS port). Both config and data live under /opt/adguardhome,
  # so the whole tree is the panel volume.
  docker:
    image: "adguard/adguardhome:latest"
    data_path: /opt/adguardhome
    keep_entrypoint: true
    user: "0:0"

  variables:
    - key: TZ
      name: "Timezone"
      type: string
      default: "Europe/Copenhagen"

  install:
    image: "adguard/adguardhome:latest"
    script: |
      mkdir -p /data/work /data/conf
      echo "AdGuard Home data directories ready"

  startup:
    command: ""
    done_regex: 'AdGuard Home, version'

  ports:
    - { name: web,     default: 3000, protocol: tcp }
    - { name: dns,     default: 53,   protocol: udp }
    - { name: dns-tcp, default: 53,   protocol: tcp }

  backup:
    include: ["."]
