gameskill:
  id: headscale
  name: "Headscale"
  category: "Apps"
  description: >
    Self-hosted, open-source implementation of the Tailscale control server
    (juanfont/headscale). STARTER TEMPLATE: the install step writes a working
    config, but you MUST set SERVER_URL to the address your devices reach this
    server on (e.g. https://vpn.example.com), and there's no web signup — add
    nodes from the console with `headscale users create <name>` and
    `headscale preauthkeys create --user <name> --reusable`, then
    `tailscale up --login-server <SERVER_URL> --authkey <key>` on each client.
  author: "yggdrasil-community"
  version: 2
  icon: "app"

  # Pinned to 0.26.1 to match the Headplane UI rune (config keys change between
  # minor versions). The official image is distroless (ko-built, no shell) with the
  # binary as its ENTRYPOINT, so we keep_entrypoint and pass args via startup.exec
  # (raw argv — a /bin/sh -c command can't run in a shell-less image). Runs as the
  # panel uid; config + SQLite DB + noise key live in /var/lib/headscale (volume).
  docker:
    image: "headscale/headscale:0.26.1"
    data_path: /var/lib/headscale
    keep_entrypoint: true

  variables:
    # The URL your Tailscale clients use to reach this control server. MUST be set
    # to your real public address (the panel's Connect Address shows host:port).
    - key: SERVER_URL
      name: "Server URL (the address clients connect to)"
      type: string
      default: "http://127.0.0.1:8080"
    - key: BASE_DOMAIN
      name: "MagicDNS base domain"
      type: string
      default: "headscale.internal"

  # The headscale image has no shell, so the config-writing step runs in busybox
  # (same /data mount). The runtime still uses the headscale image above.
  install:
    image: "busybox:latest"
    script: |
      set -e
      # Seed a config into the persisted volume (mounted at /data during install;
      # served from /var/lib/headscale at runtime). Regenerated each (re)install —
      # edit /var/lib/headscale/config.yaml via the Files tab for deeper tuning.
      cat > /data/config.yaml <<CFG
      server_url: {{SERVER_URL}}
      listen_addr: 0.0.0.0:8080
      metrics_listen_addr: 0.0.0.0:9090
      grpc_listen_addr: 0.0.0.0:50443
      grpc_allow_insecure: false
      # Put the control socket in the writable volume (default /var/run/headscale
      # isn't writable by the non-root panel uid).
      unix_socket: /var/lib/headscale/headscale.sock
      unix_socket_permission: "0770"
      noise:
        private_key_path: /var/lib/headscale/noise_private.key
      prefixes:
        v4: 100.64.0.0/10
        v6: fd7a:115c:a1e0::/48
        allocation: sequential
      derp:
        server:
          enabled: false
        urls:
          - https://controlplane.tailscale.com/derpmap/default
        auto_update_enabled: true
        update_frequency: 24h
      disable_check_updates: false
      ephemeral_node_inactivity_timeout: 30m
      database:
        type: sqlite
        sqlite:
          path: /var/lib/headscale/db.sqlite
          write_ahead_log: true
      # Access-control policy (0.26+). file mode with an empty path = allow-all
      # default; edit config.yaml + add a policy file later to lock it down.
      policy:
        mode: file
        path: ""
      log:
        format: text
        level: info
      dns:
        magic_dns: false
        base_domain: {{BASE_DOMAIN}}
        nameservers:
          global:
            - 1.1.1.1
            - 1.0.0.1
      CFG
      echo "Headscale config written. Set SERVER_URL to your public address, then Start."

  startup:
    # Raw argv passed to the image's headscale entrypoint (shell-less image).
    # Logs a "listening and serving" line once the control server is up on :8080.
    exec: ["serve", "-c", "/var/lib/headscale/config.yaml"]
    done_regex: 'listening and serving|Starting Headscale'

  config_files:
    - "config.yaml"

  ports:
    - { name: web, default: 8080, protocol: tcp }

  backup:
    include: ["."]
