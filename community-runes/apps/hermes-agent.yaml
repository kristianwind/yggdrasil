gameskill:
  id: hermes-agent
  name: "Hermes Agent"
  category: "Apps"
  description: >
    EXPERIMENTAL / COMMUNITY. Hermes — a self-improving AI agent by Nous Research
    (github.com/NousResearch/hermes-agent). Web dashboard + optional OpenAI-compatible
    API. Pick your LLM provider below — Anthropic, OpenAI, OpenRouter, DeepSeek, Gemini,
    or any OpenAI-compatible endpoint (Mistral, OVH, a local Ollama/vLLM) via "custom"
    + a base URL. You pay the provider's API usage. Set a dashboard password too. You
    can always fine-tune the model later in the dashboard or in config.yaml (Files tab).
  author: "yggdrasil-community"
  version: 2
  icon: "app"

  docker:
    # s6-overlay runs as PID 1 (root) and drops to PUID:PGID; keep the entrypoint and
    # run 0:0 so data-volume files end up owned by the panel user. All state lives in
    # /opt/data (config.yaml, memories, skills, sessions).
    image: "nousresearch/hermes-agent:latest"
    data_path: /opt/data
    keep_entrypoint: true
    user: "0:0"

  variables:
    # --- LLM provider (drives the model: block in config.yaml at install) ---
    - key: LLM_PROVIDER
      name: "LLM provider"
      type: select
      options: [auto, anthropic, openai, openrouter, deepseek, gemini, custom]
      default: auto
    - key: LLM_MODEL
      name: "Model id (e.g. deepseek-v4-pro, mistral-large-latest, anthropic/claude-opus-4.7)"
      type: string
      default: ""
    - key: LLM_BASE_URL
      name: "Custom base URL (only for provider=custom: Mistral/OVH/local, ends in /v1)"
      type: string
      default: ""
    - key: LLM_API_KEY
      name: "API key for the chosen provider"
      type: string
      default: ""
      secret: true
    # --- Web dashboard (port must stay 9119 = the rune's web port) ---
    - { key: HERMES_DASHBOARD,      name: "Enable web dashboard (1 = on)", type: string, default: "1" }
    - { key: HERMES_DASHBOARD_HOST, name: "Dashboard bind address",       type: string, default: "0.0.0.0" }
    - { key: HERMES_DASHBOARD_PORT, name: "Dashboard port (keep 9119)",   type: int,    default: 9119 }
    - { key: HERMES_DASHBOARD_BASIC_AUTH_USERNAME, name: "Dashboard username", type: string, default: "admin" }
    - { key: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD, name: "Dashboard password", type: string, default: "change-me", secret: true }
    # --- File ownership (so the data volume is editable in the Files tab) ---
    - { key: PUID, name: "Run-as UID", type: string, default: "999" }
    - { key: PGID, name: "Run-as GID", type: string, default: "982" }

  install:
    image: "nousresearch/hermes-agent:latest"
    # Patch ONLY the model: block in config.yaml (Hermes owns the rest of the large
    # config), preserving every other key. Uses the image's bundled Python + PyYAML.
    # Runs each (re)install, so changing the provider in Settings + Reinstall re-applies.
    script: |
      python3 - <<'PY'
      import os, yaml
      p = "/data/config.yaml"
      try:
          cfg = yaml.safe_load(open(p)) or {}
      except FileNotFoundError:
          cfg = {}
      except Exception:
          cfg = {}
      prov = os.environ.get("LLM_PROVIDER", "").strip()
      mdl  = os.environ.get("LLM_MODEL", "").strip()
      burl = os.environ.get("LLM_BASE_URL", "").strip()
      key  = os.environ.get("LLM_API_KEY", "").strip()
      if mdl or burl or key or (prov and prov != "auto"):
          m = cfg.setdefault("model", {})
          if prov:
              m["provider"] = prov
          if mdl:
              m["default"] = mdl
          m["base_url"] = burl
          if key:
              m["api_key"] = key
          yaml.safe_dump(cfg, open(p, "w"), sort_keys=False, allow_unicode=True)
          print("Hermes model configured:", m.get("provider"), "/", m.get("default") or "(unset)", "/", burl or "(provider default)")
      else:
          print("No provider override set — using Hermes defaults / dashboard config.")
      PY

  startup:
    exec: [gateway, run]
    # Flip to "running" precisely when the dashboard is up (or the gateway reports started).
    done_regex: 'HERMES_DASHBOARD_READY|gateway is now running'

  config_files:
    - "config.yaml"

  ports:
    - { name: web, default: 9119, protocol: tcp }   # dashboard (web UI)

  backup:
    include: ["."]
