gameskill:
  id: jellyfin
  name: "Jellyfin"
  category: "Apps"
  description: "Free software media server — stream your movies, TV and music"
  author: "yggdrasil-community"
  version: 1
  icon: "app"

  docker:
    image: "jellyfin/jellyfin:latest"
    data_path: /config
    keep_entrypoint: true
    user: "0:0"

  install:
    image: "jellyfin/jellyfin:latest"
    script: |
      mkdir -p /data
      echo "Jellyfin config directory ready"

  startup:
    command: ""
    done_regex: 'Startup complete'

  ports:
    - { name: web, default: 8096, protocol: tcp }

  # To serve media: as an admin, open this server's Settings → "Host mounts" and add
  # your library, e.g. /mnt/mediaserver → /media (read-only is fine). Then add /media
  # as a library inside Jellyfin's web UI. Host mounts are admin-only and set per
  # server (never in the rune), so an imported rune can't mount the host filesystem.
  # You can also point Jellyfin at a network share (SMB/NFS) directly from its UI.
  backup:
    include: ["."]
