gameskill:
  id: wordpress
  name: "WordPress"
  category: "Apps"
  description: "The world's most popular website/CMS. An app stack: the panel runs WordPress together with its own MariaDB database on a private network — no separate database rune to set up. Just pick a database password and go."
  author: "yggdrasil-community"
  version: 6
  icon: "app"

  # WordPress serves from /var/www/html (Apache). Runs the image's entrypoint as
  # root so Apache can bind its port and the entrypoint can populate the webroot.
  docker:
    image: "wordpress:latest"
    data_path: /var/www/html
    keep_entrypoint: true
    user: "0:0"
    # Fixed wiring to the bundled MariaDB sidecar (service name "db" = its DNS alias).
    env:
      WORDPRESS_DB_HOST: "db"
      WORDPRESS_DB_USER: "{{DB_USER}}"
      WORDPRESS_DB_PASSWORD: "{{DB_PASSWORD}}"
      WORDPRESS_DB_NAME: "{{DB_NAME}}"

  variables:
    - key: DB_NAME
      name: "Database name"
      type: string
      default: "wordpress"
    - key: DB_USER
      name: "Database user"
      type: string
      default: "wordpress"
    - key: DB_PASSWORD
      name: "Database password (change this)"
      type: string
      default: "change-me"
    - key: DB_ROOT_PASSWORD
      name: "Database root password (change this)"
      type: string
      default: "change-me-root"

  # The bundled database — reached by the app as "db". Its data lives in the panel
  # volume (under .stack/db), so a backup of this server captures the database too.
  services:
    - name: db
      image: "mariadb:lts"
      data_path: /var/lib/mysql
      env:
        MARIADB_DATABASE: "{{DB_NAME}}"
        MARIADB_USER: "{{DB_USER}}"
        MARIADB_PASSWORD: "{{DB_PASSWORD}}"
        MARIADB_ROOT_PASSWORD: "{{DB_ROOT_PASSWORD}}"

  install:
    image: "wordpress:latest"
    # Seed an .htaccess that raises PHP upload limits (plugin/theme/media uploads).
    # It lives in the webroot (mounted), so it survives container recreation; the
    # block sits above WordPress's own # BEGIN/END WordPress section, which WP
    # preserves when it manages permalinks. Apache mod_php reads php_value directives.
    script: |
      mkdir -p /data
      if ! grep -q "Yggdrasil upload limits" /data/.htaccess 2>/dev/null; then
        {
          echo "# BEGIN Yggdrasil upload limits"
          echo "<IfModule mod_php.c>"
          echo "php_value upload_max_filesize 128M"
          echo "php_value post_max_size 128M"
          echo "php_value memory_limit 256M"
          echo "php_value max_execution_time 300"
          echo "php_value max_input_time 300"
          echo "</IfModule>"
          echo "# END Yggdrasil upload limits"
          echo ""
          [ -f /data/.htaccess ] && cat /data/.htaccess
        } > /data/.htaccess.ygg && mv /data/.htaccess.ygg /data/.htaccess
        chown 33:33 /data/.htaccess 2>/dev/null || true
        chmod 644 /data/.htaccess
      fi
      echo "WordPress webroot ready (PHP upload limit raised to 128M)"

  startup:
    command: ""
    done_regex: 'Command line:'

  ports:
    - { name: web, default: 80, protocol: tcp }

  backup:
    include: ["."]

  # Bring an existing WordPress site in: upload the webroot (wp-content etc.) and
  # a MySQL dump from the old host. The archive lands in the data dir, the dump is
  # loaded into the stack's MariaDB sidecar, and wp-config.php is rewritten to this
  # server's DB credentials so the site comes up against the panel's database.
  import:
    inputs:
      - key: files
        label: "Site archive (webroot: wp-content, uploads, …)"
        accept: ".tar.gz,.tgz,.tar,.zip"
        optional: true
      - key: db
        label: "Database dump (mysqldump .sql or .sql.gz)"
        accept: ".sql,.sql.gz,.gz"
    steps:
      - unpack: files
        to: "."
      - db_import:
          input: db
          service: db
          image: "mariadb:lts"
          command: "mariadb -h db -u {{DB_USER}} -p{{DB_PASSWORD}} {{DB_NAME}}"
      - script: |
          set -e
          # Point the imported wp-config.php at this server's stack DB (the old
          # host's credentials won't match). Leaves everything else untouched.
          cfg=/data/wp-config.php
          if [ -f "$cfg" ]; then
            sed -i "s/define( *'DB_NAME'.*/define('DB_NAME', '{{DB_NAME}}');/" "$cfg"
            sed -i "s/define( *'DB_USER'.*/define('DB_USER', '{{DB_USER}}');/" "$cfg"
            sed -i "s/define( *'DB_PASSWORD'.*/define('DB_PASSWORD', '{{DB_PASSWORD}}');/" "$cfg"
            sed -i "s/define( *'DB_HOST'.*/define('DB_HOST', 'db');/" "$cfg"
            echo "wp-config.php repointed to the panel database"
          else
            echo "no wp-config.php in the archive — the image will generate one on first boot"
          fi

  # Default Kvasir watchers — seeded per server as editable rules.
  watchers:
    - name: "PHP fatal errors"
      pattern: "PHP Fatal error"
      threshold: 1
      window_secs: 300
      action: kvasir
    - name: "Login brute force"
      pattern: "POST /wp-login\\.php"
      threshold: 20
      window_secs: 120
      action: kvasir
    - name: "HTTP 5xx spike"
      pattern: '" 5\d\d '
      threshold: 10
      window_secs: 60
      action: kvasir
