gameskill:
  id: mongodb
  name: "MongoDB"
  category: "Databases"
  # Pinned to 4.4 — MongoDB 5.0+ requires the CPU AVX instruction set, which a
  # default Proxmox/QEMU VM ("kvm64" / "QEMU Virtual CPU") does NOT expose, so
  # mongo:5/6/7 crash on boot with "Illegal instruction (core dumped)". 4.4 is
  # the last AVX-free release and is exactly what Grasscutter (the main consumer
  # here) wants anyway. To run a newer MongoDB, set the Proxmox VM CPU type to
  # "host" (Hardware → Processors → Type: host), reboot the VM, then bump this image.
  description: "MongoDB 4.4 (avoids the AVX requirement of Mongo 5+, which a default Proxmox VM CPU can't satisfy) — a backing store for other runes/apps (e.g. Grasscutter)."
  author: "yggdrasil-core"
  version: 2
  icon: "database"

  docker:
    image: "mongo:4.4"

  variables:
    # These keys are the exact env vars the official mongo image reads to create
    # the root user on first launch — Yggdrasil passes all variables as env.
    - key: MONGO_INITDB_ROOT_USERNAME
      name: "Root username"
      type: string
      default: "root"
    - key: MONGO_INITDB_ROOT_PASSWORD
      name: "Root password"
      type: string
      default: "change-me"

  install:
    image: "mongo:4.4"
    script: |
      set -e
      # mongod stores its data under /data/db (the image default); /data is the
      # panel's persistent volume, so this subdir survives restarts/updates.
      mkdir -p /data/db
      echo "MongoDB data directory ready at /data/db"

  startup:
    # Reuse the image's entrypoint (the panel clears ENTRYPOINT) so the first-run
    # root-user creation from MONGO_INITDB_ROOT_* still happens. exec → PID 1 so
    # mongod gets SIGTERM and shuts down cleanly on stop.
    command: "exec docker-entrypoint.sh mongod --bind_ip_all"
    done_regex: 'Waiting for connections'

  # Databases have no game query/RCON; status comes from the running container
  # and the connect address (host:27017).

  ports:
    - { name: db, default: 27017, protocol: tcp }

  backup:
    include: ["db"]
