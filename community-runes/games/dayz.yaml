gameskill:
  id: dayz
  name: "DayZ"
  category: "DayZ"
  description: "DayZ dedicated server (SteamCMD; requires a Steam account that owns DayZ)"
  author: "yggdrasil-core"
  version: 1
  icon: "dayz"

  # CAVEAT: The DayZ Linux dedicated server is supported via SteamCMD (app 223350)
  # but has historically been finicky. Mods come from the *client* app (221100)
  # Workshop. DayZ requires a real Steam login that OWNS the game — anonymous
  # login does NOT work. Authorize the host's Steam account once via the UI
  # (Settings → Steam) before installing; the sentry/credential cache is then
  # reused for all future updates so Steam Guard is not re-triggered.
  docker:
    image: "cm2network/steamcmd:latest"

  steam:
    app_id: 223350        # DayZ Server (verified). Client/Workshop app: 221100
    anonymous: false      # requires an account that owns DayZ → one-time auth flow

  variables:
    # In-game name uses the panel's server name (injected as {{SERVER_NAME}}).
    - key: BETA_BRANCH
      name: "Branch"
      type: select
      options: [stable, experimental]
      default: stable
    - key: MAX_PLAYERS
      name: "Max players"
      type: int
      default: 60
    # GAME_PORT and QUERY_PORT are injected automatically from the ports Yggdrasil
    # allocates for this server (each server gets its own), and published 1:1 so
    # DayZ advertises the same port to Steam that's forwarded. Don't add them as
    # variables here.
    - key: PASSWORD
      name: "Server password (blank = public)"
      type: string
      default: ""
    - key: ADMIN_PASSWORD
      name: "In-game admin password"
      type: string
      default: ""
    - key: RCON_PASSWORD
      name: "BattlEye RCON password"
      type: string
      default: "change-me"
    - key: MISSION
      name: "Mission / map (chernarusplus = Chernarus, enoch = Livonia, or a custom modded mission)"
      type: string
      default: "dayzOffline.chernarusplus"
    - key: MODS
      name: "Workshop mods — semicolon-separated IDs, in load order (press Update/Reinstall after changing to download them)"
      type: string
      default: ""

  install:
    image: "cm2network/steamcmd:latest"
    script: |
      set -e
      # Fail early + clearly if the disk is too full for the ~4GB download (else
      # SteamCMD just reports a cryptic "Not enough disk quota" / state 0x202).
      FREE_MB=$(df -Pm /data 2>/dev/null | awk 'NR==2{print $4}')
      if [ -n "$FREE_MB" ] && [ "$FREE_MB" -lt 5000 ]; then
        echo "ERROR: only ${FREE_MB} MB free on the data disk — DayZ needs ~4GB."
        echo "Free up space (delete unused servers) or expand the disk, then retry."
        exit 9
      fi
      # Uses the persisted authorized-account cache (see Steam authorization).
      # STEAM_USER is injected by Yggdrasil for non-anonymous gameskills; the
      # sentry cache at $HOME (/steamcache) avoids re-triggering Steam Guard.
      # Experimental uses the SteamCMD beta branch.
      BETA=""
      [ "{{BETA_BRANCH}}" = "experimental" ] && BETA="-beta experimental"
      STEAMCMD="${STEAMCMDDIR:-/home/steam/steamcmd}/steamcmd.sh"
      # SteamCMD content downloads are flaky — transient "Timed out waiting for
      # update to start, bailing" / app state 0x204 failures are common. Retry a
      # few times; app_update is resumable and idempotent so retries continue.
      i=1; ok=0
      while [ $i -le 4 ]; do
        if "$STEAMCMD" +force_install_dir /data +login "$STEAM_USER" +app_update 223350 $BETA validate +quit; then ok=1; break; fi
        echo "=== SteamCMD download attempt $i/4 failed (Steam content servers can be flaky) — retrying in 15s ==="
        i=$((i+1)); sleep 15
      done
      [ $ok -eq 1 ] || { echo "ERROR: DayZ failed to download after 4 attempts. Steam may be busy — press Update/Reinstall to try again."; exit 8; }
      # Ensure the server executables are runnable, then report the library
      # situation so any "CrashReporter: not found" (a missing-.so error) is
      # diagnosable from the install log.
      chmod +x /data/DayZServer 2>/dev/null || true
      [ -f /data/CrashReporter ] && chmod +x /data/CrashReporter 2>/dev/null || true
      echo "=== DayZ server files (top level) ==="; ls -la /data | head -40
      if command -v ldd >/dev/null 2>&1 && [ -f /data/CrashReporter ]; then
        echo "=== ldd CrashReporter (missing libs show as 'not found') ==="
        LD_LIBRARY_PATH="/data:${LD_LIBRARY_PATH:-}" ldd /data/CrashReporter 2>&1 | grep -i "not found" || echo "(all CrashReporter libs resolve with /data on the path)"
      fi
      # Steam Workshop mods. MODS is a semicolon-separated list of Workshop item
      # IDs (DayZ client app 221100). For each: download via SteamCMD, copy the
      # mod into /data/@<id>, and stage its .bikey signatures into /data/keys so
      # the server (verifySignatures=2) accepts them. Re-run on every (re)install
      # to pick up mod updates. Requires the same DayZ-owning Steam account.
      mkdir -p /data/keys
      for MOD_ID in $(echo "{{MODS}}" | tr ';,' '  '); do
        [ -n "$MOD_ID" ] || continue
        echo "=== Workshop mod $MOD_ID ==="
        "$STEAMCMD" +force_install_dir /data +login "$STEAM_USER" \
          +workshop_download_item 221100 "$MOD_ID" validate +quit
        SRC="$HOME/Steam/steamapps/workshop/content/221100/$MOD_ID"
        [ -d "$SRC" ] || SRC="/data/steamapps/workshop/content/221100/$MOD_ID"
        if [ -d "$SRC" ]; then
          rm -rf "/data/@$MOD_ID"
          cp -r "$SRC" "/data/@$MOD_ID"
          # Mod keys live in keys/ or Keys/ inside the mod; stage them all.
          find "/data/@$MOD_ID" -iname '*.bikey' -exec cp -f {} /data/keys/ \; 2>/dev/null || true
          echo "installed mod @$MOD_ID"
        else
          echo "WARNING: mod $MOD_ID did not download (check Steam ownership/login)"
        fi
      done
      # Seed serverDZ.cfg with the panel's name + (optional) join/admin password
      # so the server is reachable and can be made private. Regenerated on each
      # (re)install — edit the file directly via the Files tab for deeper tuning
      # and avoid reinstalling, the same as other games' config files.
      cat > /data/serverDZ.cfg <<CFG
      hostname = "{{SERVER_NAME}}";
      password = "{{PASSWORD}}";
      passwordAdmin = "{{ADMIN_PASSWORD}}";
      maxPlayers = {{MAX_PLAYERS}};
      steamQueryPort = {{QUERY_PORT}};
      verifySignatures = 2;
      forceSameBuild = 1;
      disableVoN = 0;
      vonCodecQuality = 20;
      disable3rdPerson = 0;
      disableCrosshair = 0;
      serverTime = "SystemTime";
      serverTimeAcceleration = 1;
      serverTimePersistent = 0;
      guaranteedUpdates = 1;
      loginQueueConcurrentPlayers = 5;
      loginQueueMaxPlayers = 500;
      instanceId = 1;
      lootHistory = 1;
      storageAutoFix = 1;
      class Missions
      {
          class DayZ
          {
              template = "{{MISSION}}";
          };
      };
      CFG

  startup:
    # Build the -mod load order from MODS (in the given order), then exec the
    # server so it becomes PID 1 and receives SIGTERM on stop.
    command: |
      MODARG=""
      for MOD_ID in $(echo "{{MODS}}" | tr ';,' '  '); do
        [ -n "$MOD_ID" ] || continue
        # Only include mods that actually installed — a -mod pointing at a missing
        # @id makes DayZServer exit on start (e.g. if the Workshop download failed).
        if [ ! -d "@$MOD_ID" ]; then
          echo "WARNING: mod @$MOD_ID is not installed (download may have failed) — skipping it"
          continue
        fi
        MODARG="${MODARG:+$MODARG;}@$MOD_ID"
      done
      [ -n "$MODARG" ] && MODARG="-mod=$MODARG"
      if [ ! -f ./DayZServer ]; then
        echo "DayZServer not found in /data — the install may not have completed. Re-run Install."
        echo "Contents of /data:"; ls -la /data | head -40
        exit 1
      fi
      # DayZ ships its shared libraries (and the CrashReporter helper) in the
      # server dir. Without /data on the library path the dynamic loader can't
      # resolve them and reports "CrashReporter: not found" (a missing-.so error,
      # not a missing file). Put /data first so both resolve.
      export LD_LIBRARY_PATH="/data:${LD_LIBRARY_PATH:-}"
      chmod +x ./DayZServer 2>/dev/null || true
      [ -f ./CrashReporter ] && chmod +x ./CrashReporter 2>/dev/null || true
      # NOTE: do NOT pass -BEpath here. An explicit -BEpath=battleye makes
      # BattlEye init fail and the server abort with "Server creation failed";
      # DayZ finds and initialises BattlEye on its own from the server dir.
      exec ./DayZServer -config=serverDZ.cfg -port={{GAME_PORT}} $MODARG -dologs -adminlog -netlog -freezecheck
    done_regex: 'Mission read'
    # DayZ has no console save/stop command — it persists on its own Central
    # Economy timer and flushes on a clean SIGTERM shutdown. So give it a generous
    # grace period (90s) instead of being SIGKILL'd mid-save on restart/stop.
    # (Also: keep a short CE auto-save interval in your mission so at most a couple
    # of minutes of base/vehicle/stash changes are ever at risk.)
    stop_timeout: 90

  query:
    type: a2s

  rcon:
    enabled: true
    type: battleye             # BattlEye BERcon protocol (UDP)
    port_var: GAME_PORT
    password_var: RCON_PASSWORD

  config_files:
    - "serverDZ.cfg"
    - "battleye/beserver_x64.cfg"

  ports:
    - { name: game,  default: 2302,  protocol: udp }
    - { name: query, default: 27016, protocol: udp }

  anticheat:
    battleye:
      supported: true
      config_hint: "BattlEye enabled via -BEpath=battleye; kick/ban events surface in the console"

  bans:
    # BattlEye RCon: addBan <GUID> <minutes,0=perm> <reason>. {{player}} should be
    # the BattlEye GUID for a permanent cross-restart ban.
    ban_command: "addBan {{player}} 0 {{reason}}"
    unban_command: "removeBan {{player}}"

  # Live Players tab over BattlEye BERcon. `players` returns a table:
  #   0   45.83.19.12:2304   31   9a8b...(OK) SurvivorName
  # player_regex parses one row per line (named groups; unmatched header/total
  # lines are skipped). Kick is by slot id; broadcast is "say -1" (all players);
  # #lock/#unlock stop/allow new joins. Single-quoted so regex backslashes stay
  # literal.
  players:
    list_command: "players"
    player_regex: '^(?P<id>\d+)\s+(?P<ip>[0-9.]+):\d+\s+(?P<ping>\d+)\s+(?P<guid>[0-9a-f]+)\s*\((?:OK|\?)\)\s+(?P<name>.+?)\s*$'
    kick_command: "kick {{id}} {{reason}}"
    broadcast_command: "say -1 {{message}}"
    lock_command: "#lock"
    unlock_command: "#unlock"

  # Admin-log feed (session history). DayZ writes a per-session .ADM log under
  # profiles/ with timestamped lines like:
  #   15:04:23 | Player "Bob" is connected (id=abc)
  #   15:41:07 | Player "Bob"(...) has been disconnected
  #   16:02:55 | Player "Bob"(...) killed by Player "Bandit"(...) with M4A1
  #   16:10:31 | Player "Bob"(...) died. Stats>...
  # The most recent .ADM is tailed and each line classified. Single-quoted so
  # regex backslashes stay literal.
  admin_log:
    path: "profiles/*.ADM"
    time_regex: '^(?P<time>\d{1,2}:\d{2}:\d{2})'
    events:
      - { type: "kill",  regex: 'Player "(?P<name>[^"]+)".*killed by' }
      - { type: "death", regex: 'Player "(?P<name>[^"]+)".*(died\.|bled out|committed suicide)' }
      - { type: "join",  regex: 'Player "(?P<name>[^"]+)" is connected' }
      - { type: "leave", regex: 'Player "(?P<name>[^"]+)".*has been disconnected' }

  backup:
    include: ["mpmissions", "serverDZ.cfg", "battleye", "profiles"]

  # "Wipe" resets persistence (loot, bases, player storage) — delete the mission
  # storage folders; the world regenerates on the next start. Adjust paths if your
  # mission stores persistence elsewhere.
  wipe:
    paths: ["mpmissions/*/storage_*"]
    backup_first: true

  # In-game countdown broadcast (BattlEye RCon "say -1" = all players) before a
  # safe restart.
  restart:
    warnings:
      - { at: "15m", msg: "say -1 Server restart in 15 minutes." }
      - { at: "5m",  msg: "say -1 Server restart in 5 minutes." }
      - { at: "1m",  msg: "say -1 Restarting in 1 minute!" }
