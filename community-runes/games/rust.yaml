gameskill:
  id: rust
  name: "Rust"
  category: "Rust"
  description: "Facepunch Rust dedicated server (SteamCMD, anonymous login)"
  author: "yggdrasil-core"
  version: 1
  icon: "rust"

  docker:
    # SteamCMD base image with the Steam runtime libs RustDedicated needs.
    image: "cm2network/steamcmd:latest"

  steam:
    app_id: 258550        # Rust Dedicated Server (verified) — anonymous works
    anonymous: true

  variables:
    # The in-game/browser name uses the panel's server name (injected as
    # {{SERVER_NAME}}) — no separate field needed.
    - key: SERVER_DESCRIPTION
      name: "Description"
      type: string
      default: "Powered by Yggdrasil"
    - key: MAX_PLAYERS
      name: "Max players"
      type: int
      default: 50
    - key: WORLD_SIZE
      name: "World size"
      type: int
      default: 3500
    - key: SEED
      name: "Map seed"
      type: int
      default: 12345
    - key: RCON_PORT
      name: "RCON port"
      type: int
      default: 28016
    - key: RCON_PASSWORD
      name: "RCON password"
      type: string
      default: "change-me"

  install:
    image: "cm2network/steamcmd:latest"
    script: |
      set -e
      # Fail early + clearly if the disk is too full for the multi-GB download.
      FREE_MB=$(df -Pm /data 2>/dev/null | awk 'NR==2{print $4}')
      if [ -n "$FREE_MB" ] && [ "$FREE_MB" -lt 12000 ]; then
        echo "ERROR: only ${FREE_MB} MB free on the data disk — Rust needs ~10GB."
        echo "Free up space (delete unused servers) or expand the disk, then retry."
        exit 9
      fi
      # Long download (several GB). Yggdrasil streams progress to the UI.
      # SteamCMD content downloads are flaky (transient "Timed out waiting for
      # update to start" / state 0x204); retry — app_update is resumable.
      STEAMCMD="${STEAMCMDDIR:-/home/steam/steamcmd}/steamcmd.sh"
      i=1; ok=0
      while [ $i -le 4 ]; do
        if "$STEAMCMD" +force_install_dir /data +login anonymous +app_update 258550 validate +quit; then ok=1; break; fi
        echo "=== SteamCMD download attempt $i/4 failed — retrying in 15s ==="
        i=$((i+1)); sleep 15
      done
      [ $ok -eq 1 ] || { echo "ERROR: Rust failed to download after 4 attempts. Steam may be busy — press Update/Reinstall to try again."; exit 8; }

  startup:
    # Rust takes many +server.* / +rcon.* flags; RCON is WebSocket-based.
    # RustDedicated needs steamclient.so on its library path; expose it from the
    # SteamCMD install. If the binary is missing, print /data so it's diagnosable.
    command: >
      sh -c 'chmod +x ./RustDedicated 2>/dev/null;
      if [ ! -x ./RustDedicated ]; then echo "RustDedicated not found in /data — contents:"; ls -la; exit 1; fi;
      export LD_LIBRARY_PATH="$PWD:$PWD/RustDedicated_Data/Plugins/x86_64:$HOME/.steam/sdk64:$LD_LIBRARY_PATH";
      ./RustDedicated -batchmode -nographics
      +server.identity "yggdrasil"
      +server.hostname "{{SERVER_NAME}}"
      +server.description "{{SERVER_DESCRIPTION}}"
      +server.maxplayers {{MAX_PLAYERS}}
      +server.worldsize {{WORLD_SIZE}}
      +server.seed {{SEED}}
      +server.port {{GAME_PORT}}
      +server.queryport {{QUERY_PORT}}
      +rcon.web 1
      +rcon.port {{RCON_PORT}}
      +rcon.password "{{RCON_PASSWORD}}"'
    done_regex: 'SteamServer Initialized'
    # No console stop command; Rust stops cleanly on SIGTERM.

  query:
    type: a2s

  rcon:
    enabled: true
    type: rust-websocket        # Rust uses WebSocket RCON, not Source RCON
    password_var: RCON_PASSWORD

  config_files:
    - "server/yggdrasil/cfg/server.cfg"
    - "server/yggdrasil/cfg/users.cfg"

  ports:
    - { name: game,  default: 28015, protocol: udp }
    - { name: query, default: 28015, protocol: udp }
    - { name: rcon,  default: 28016, protocol: tcp }

  anticheat:
    # EAC ships with Rust and runs client-side; nothing to toggle server-side
    # beyond keeping it enabled (default). Kick/ban events appear in the console.
    plugins_recommended: ["EAC (built-in)", "VAC"]

  bans:
    # Rust accepts a steamid or name. Reason is quoted by the console parser.
    ban_command: 'ban "{{player}}" "{{reason}}"'
    unban_command: 'unban "{{player}}"'

  backup:
    include: ["server/yggdrasil"]
