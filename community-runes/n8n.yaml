gameskill:
  id: n8n
  name: "n8n"
  category: "Apps"
  description: "Workflow automation — connect apps and APIs with a visual editor"
  author: "yggdrasil-community"
  version: 1
  icon: "app"

  docker:
    image: "n8nio/n8n:latest"

  variables:
    # Store data on the panel volume; HOME keeps the non-root run-as user happy.
    - key: N8N_USER_FOLDER
      name: "Data folder"
      type: string
      default: "/data"
    - key: HOME
      name: "HOME"
      type: string
      default: "/data"
    - key: N8N_PORT
      name: "Internal port"
      type: int
      default: 5678
    - key: GENERIC_TIMEZONE
      name: "Timezone"
      type: string
      default: "Europe/Copenhagen"

  install:
    image: "n8nio/n8n:latest"
    script: |
      mkdir -p /data
      echo "n8n data directory ready"

  startup:
    command: "n8n"
    done_regex: 'Editor is now accessible'

  ports:
    - { name: web, default: 5678, protocol: tcp }

  backup:
    include: ["."]
