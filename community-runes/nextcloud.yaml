gameskill:
  id: nextcloud
  name: "Nextcloud"
  category: "Apps"
  description: "Self-hosted files, calendar, contacts and more (LinuxServer image; SQLite by default, can use a DB rune). Serves HTTPS with a self-signed cert."
  author: "yggdrasil-community"
  version: 2
  icon: "app"

  # LinuxServer's image starts as root and drops to PUID:PGID, then runs nginx as
  # that uid — so it can write the persistent volume. (The official nextcloud image
  # ran Apache as a fixed www-data:33 and couldn't write the panel-owned data dir,
  # failing first-run with "touch config.php ... Permission denied" → 503.) Set
  # PUID/PGID to the panel's user (the owner of the data dir) and it works.
  docker:
    image: "lscr.io/linuxserver/nextcloud:latest"
    data_path: /config
    keep_entrypoint: true
    user: "0:0"

  variables:
    # Must match the user that owns this server's data dir (the panel's service
    # user — uid 999:982 on a standard install).
    - key: PUID
      name: "Run-as UID (must own the data dir)"
      type: int
      default: 999
    - key: PGID
      name: "Run-as GID"
      type: int
      default: 982
    - key: TZ
      name: "Timezone"
      type: string
      default: "Europe/Copenhagen"

  install:
    image: "lscr.io/linuxserver/nextcloud:latest"
    script: |
      mkdir -p /data
      echo "Nextcloud config directory ready"

  startup:
    # Image's own s6 init (keep_entrypoint) brings up nginx + php-fpm. It prints
    # "[ls.io-init] done." once setup completes and the services start.
    command: ""
    done_regex: '\[ls\.io-init\] done\.'

  # HTTPS only, self-signed cert (browse https://host:port and accept the warning).
  ports:
    - { name: web, default: 443, protocol: tcp }

  backup:
    include: ["."]
